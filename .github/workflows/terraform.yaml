name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform-and-ansible-checks:
    name: Terraform & Ansible CI
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    env:
      AWS_REGION: "eu-west-1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via Assume Role
        run: |
          CREDS=$(aws sts assume-role --role-arn "arn:aws:iam::738563260931:role/role_etudiants" --role-session-name "GitHubActions" --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | awk '{print $1}')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | awk '{print $2}')" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | awk '{print $3}')" >> $GITHUB_ENV
          echo "AWS_REGION=eu-west-1" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Format
        run: terraform fmt -check -recursive
        working-directory: ./terraform

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          # We might want to skip some checks that fail intentionally in a student lab
          soft_fail: true

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost estimate
        run: |
          # Affiche le résumé dans les logs
          infracost breakdown --path terraform/ --show-skipped
          # Génère le fichier JSON pour le commentaire PR
          infracost breakdown --path terraform/ --format json --out-file /tmp/infracost.json
          # Ajoute le rapport au "Job Summary" de GitHub Actions pour qu'il soit visible sur la page principale
          echo "### 💰 Rapport Infracost" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          infracost breakdown --path terraform/ --show-skipped >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Post Infracost comment
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github --path=/tmp/infracost.json \
                                   --repo=$GITHUB_REPOSITORY \
                                   --github-token=${{ github.token }} \
                                   --pull-request=${{ github.event.pull_request.number }} \
                                   --behavior=update
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Run Ansible Lint
        run: ansible-lint ansible/playbook.yml
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform
        # Only succeeds if AWS credentials are provided
        continue-on-error: true
