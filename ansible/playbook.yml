---
- name: Update Lambda Function Source Code
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    lambda_name: "img2pdf-converter"
    src_dir: "src"
    build_dir: "build"
    zip_file: "lambda_updated.zip"

  tasks:
    - name: Create build directory
      ansible.builtin.file:
        path: "{{ build_dir }}"
        state: directory
        mode: '0755'

    - name: Install dependencies
      ansible.builtin.pip:
        requirements: "{{ src_dir }}/requirements.txt"
        extra_args: "-t {{ build_dir }}"
    - name: Copy handler to build directory
      ansible.builtin.copy:
        src: "{{ src_dir }}/handler.py"
        dest: "{{ build_dir }}/handler.py"
        mode: '0644'

    - name: Zip the build directory
      community.general.archive:
        path: "{{ build_dir }}/*"
        dest: "{{ zip_file }}"
        format: zip
        mode: '0644'

    - name: Get Lambda info to satisfy role requirement
      amazon.aws.lambda_info:
        query:
          function_name: "{{ lambda_name }}"
      register: lambda_facts_result

    - name: Update Lambda code
      amazon.aws.lambda:
        name: "{{ lambda_name }}"
        state: present
        zip_file: "{{ zip_file }}"
        role: "{{ lambda_facts_result.lambda_facts.Role | default('arn:aws:iam::000000000000:role/dummy') }}"
        handler: "handler.lambda_handler"
        runtime: "python3.11"
    - name: Clean up build artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ build_dir }}"
        - "{{ zip_file }}"
